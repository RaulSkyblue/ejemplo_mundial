name: Mundial CI/CD

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.ASIAU6GDYEY445MLQYEM }}
          aws-secret-access-key: ${{ secrets.Ky9ndOJOKM4hcn2vjcQnFQm2IM3xPjLk9wSFHgzH }}
          aws-session-token: ${{ secrets. }}
          aws-region: us-east-1

      - name: Login ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build image
        run: |
          docker build -t mundial-app .

      - name: Tag image
        run: |
          docker tag mundial-app:latest \
          339712943673.dkr.ecr.us-east-1.amazonaws.com/mundial-app:latest

      - name: Push image
        run: |
          docker push \
          339712943673.dkr.ecr.us-east-1.amazonaws.com/mundial-app:latest

      - name: Deploy EKS
        run: echo "Configurar kubectl y actualizar deployment"
