name: Mundial CI/CD

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::123456789012:role/github-actions-role
          aws-region: us-east-1

      - name: Login ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build image
        run: docker build -t mundial-app .

      - name: Ejemplo Push ECR
        run: echo "Configurar URI ECR del laboratorio"

      - name: Deploy EKS
        run: echo "Configurar kubectl y actualizar deployment"
