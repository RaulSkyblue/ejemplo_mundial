apiVersion: apps/v1
kind: Deployment
metadata:
  name: mundial-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: mundial-app
  template:
    metadata:
      labels:
        app: mundial-app
    spec:
      containers:
      - name: mundial-app
        image: REEMPLAZAR_ECR_URI:latest
        ports:
        - containerPort: 5000
